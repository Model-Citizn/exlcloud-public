<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — EXL Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; background: #0F1F17; color: #E8F0EC; font-family: 'DM Sans', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .wrap { text-align: center; max-width: 480px; padding: 40px 24px; }
    h1 { font-family: 'DM Serif Display', Georgia, serif; font-size: 120px; font-weight: 400; color: #74C69D; margin: 0; line-height: 1; }
    h2 { font-family: 'DM Serif Display', Georgia, serif; font-size: 28px; font-weight: 400; color: #D8F3DC; margin: 16px 0; }
    p { color: rgba(255,255,255,0.55); font-size: 16px; line-height: 1.6; margin: 0 0 32px; }
    a { display: inline-block; background: linear-gradient(135deg, #74C69D, #52B788); color: #0B1F17; font-weight: 600; padding: 14px 32px; border-radius: 999px; text-decoration: none; font-size: 15px; transition: opacity 0.2s; }
    a:hover { opacity: 0.88; }
  </style>
  <script>
    // SPA fallback — redirect to hash-based routing
    (function() {
      var path = window.location.pathname;
      if (path !== '/' && path !== '/index.html' && path !== '/404.html') {
        var page = path.replace(/^\//, '').replace(/\.html$/, '').replace(/\//g, ':');
        window.location.replace('/#' + page);
      }
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/">Go to Homepage</a>
  </div>
</body>
</html>
